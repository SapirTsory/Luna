*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--canvas);font-family:'IBM Plex Sans Hebrew',system-ui,sans-serif;color:var(--ink);}
button{font-family:inherit;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important;animation-iteration-count:1 !important;}}

.app-shell{min-height:100dvh;display:flex;justify-content:center;background:var(--canvas);}
.luna-screen{position:relative;width:100%;max-width:430px;min-height:100dvh;background:var(--screen);display:flex;flex-direction:column;}
@media (min-width:431px){.luna-screen{min-height:min(844px,100dvh);margin:24px 0;border-radius:34px;box-shadow:var(--shadow-screen);overflow:hidden;}}

.header{flex:none;display:flex;align-items:center;justify-content:center;gap:9px;padding:22px 0 6px;}
.mark{width:28px;height:28px;border-radius:50%;background:linear-gradient(145deg,var(--accent-light),var(--accent));display:flex;align-items:center;justify-content:center;color:var(--screen);font-size:15px;}
.word{font-size:13px;font-weight:700;letter-spacing:.14em;color:var(--accent);}

.owner-block{flex:none;text-align:center;padding:2px 18px 6px;}
.owner-name{font-family:'Frank Ruhl Libre',serif;font-size:34px;font-weight:600;color:var(--ink);line-height:1.15;}
.owner-tag{font-size:12.5px;color:var(--accent);margin-top:4px;}

.askbar{flex:none;margin:10px 18px 4px;background:var(--card);border-radius:100px;padding:13px 18px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-soft);}
.askbar span{font-size:14px;color:var(--ink-faint);}
.search-input{flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:14px;color:var(--ink);}
.search-input::placeholder{color:var(--ink-faint);}

.askbar .spark{color:var(--accent);font-size:15px;flex:none;}

.chips-row{flex:none;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:14px 18px 2px;}
.chip{border:none;cursor:pointer;background:var(--accent-bg);color:var(--ink);font-size:13.5px;border-radius:100px;padding:10px 16px;transition:background .18s ease,color .18s ease,transform .12s ease;line-height:1.2;}
.chip:hover{transform:translateY(-1px);}
.chip.active{background:var(--accent);color:var(--screen);}

.recurring-row{flex:none;display:flex;justify-content:flex-start;align-items:flex-start;gap:14px;margin:10px 0 0;padding:2px 18px 8px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-ms-overflow-style:none;-webkit-mask-image:linear-gradient(to left,transparent 0,black 24px,black calc(100% - 24px),transparent 100%);mask-image:linear-gradient(to left,transparent 0,black 24px,black calc(100% - 24px),transparent 100%);}
.recurring-row::-webkit-scrollbar{display:none;}
.recurring-chip{flex:none;position:relative;border:none;cursor:pointer;background:transparent;display:flex;flex-direction:column;align-items:center;gap:3px;padding:0;}
.recurring-chip .bubble{width:30px;height:30px;border-radius:10px;background:var(--card);box-shadow:var(--shadow-soft);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ink-faint);opacity:.8;animation:floatSmall 5.5s ease-in-out infinite;transition:opacity .15s ease;}
.recurring-chip:nth-child(2) .bubble{animation-delay:.9s;}
.recurring-chip:nth-child(3) .bubble{animation-delay:1.8s;}
.recurring-chip:hover .bubble, .recurring-chip.show .bubble{opacity:1;}
.recurring-tip{position:fixed;transform:translate(-50%,0);white-space:nowrap;background:var(--ink);color:var(--screen);font-size:11px;padding:5px 9px;border-radius:8px;opacity:0;pointer-events:none;transition:opacity .18s ease;z-index:50;}
.recurring-tip.show{opacity:1;}
@keyframes floatSmall{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.task-list{flex:1;overflow-y:auto;margin:6px 0 0;padding:2px 18px 22px;display:flex;flex-direction:column;gap:18px;}
.domain-group{display:flex;flex-direction:column;gap:8px;}
.domain-group-header{display:flex;align-items:center;gap:8px;padding:0 2px;}
.domain-badge{flex:none;width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.domain-group-label{font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:600;color:var(--ink);}
.domain-group-count{margin-inline-start:auto;font-size:11px;color:var(--ink-faint);background:var(--card);border-radius:6px;padding:2px 7px;}
.item-card{display:flex;align-items:flex-start;gap:10px;background:var(--card);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow-soft);}
.item-marker{flex:none;width:7px;height:7px;border-radius:2px;margin-top:7px;}
.item-body{display:flex;flex-direction:column;gap:6px;min-width:0;}
.item-text{font-size:14px;color:var(--ink);line-height:1.35;}
.item-tags{display:flex;flex-wrap:wrap;gap:6px;}
.tag-chip{font-size:11px;color:var(--ink-soft);background:var(--canvas);border-radius:7px;padding:3px 8px;line-height:1.3;}
.tag-chip--time{color:var(--accent);background:var(--accent-bg);font-weight:600;}
.empty-state{text-align:center;color:var(--ink-faint);font-size:13px;padding:44px 20px;}
</style>
</head>
<body>
<div class="app-shell">
  <main class="luna-screen">
    <header class="header"><span class="mark">☾</span><span class="word">L U N A</span></header>
    <div class="owner-block">
      <div class="owner-name">סהר</div>
      <div class="owner-tag">כל מה שמסתובב לך בראש, במקום אחד</div>
    </div>
    <div class="askbar">
      <input type="text" class="search-input" id="searchInput" placeholder="מה שאת רוצה לדעת...">
      <span class="spark">✦</span>
    </div>
    <div class="chips-row" id="chips">
      <button class="chip active" data-filter="all">מה פתוח לי בכלל</button>
      <button class="chip" data-filter="quick">מה לעשות עכשיו אם יש לי 5 דקות</button>
      <button class="chip" data-filter="week">מה יש לי השבוע</button>
      <button class="chip" data-filter="big">מה הדברים הגדולים שנשארו פתוחים</button>
      <button class="chip" data-filter="tracked">מה שבמעקב אצלי</button>
      <button class="chip" data-filter="shopping">אני בקניות, מה לקנות עכשיו</button>
    </div>
    <div class="recurring-row" id="recurring"></div>
    <div class="recurring-tip" id="recurringTip"></div>
    <div class="task-list" id="taskList"></div>
  </main>
</div>

<script>
(function(){
  window.RECURRING = [
    {emoji:'🦷', label:'שיננית', cadence:'פעם בחצי שנה'},
    {emoji:'🧺', label:'להחליף מגבות', cadence:'פעם בשלושה ימים', near:true},
    {emoji:'📅', label:'לקבוע דייט', cadence:'כל יום חמישי', near:true},
    {emoji:'🎂', label:'ימי הולדת של חברים', cadence:'תזכורת קבועה'},
    {emoji:'🧹', label:'פילטר לשואב', cadence:'תזכורת קבועה'},
    {emoji:'📞', label:'להוריד מחירי ביטוח', cadence:'פעם בשנה'}
  ];
})();

(function(){
  var DOMAINS = [
    {id:'thailand', label:'תאילנד', emoji:'✈️', c:'--d-thai', bg:'--d-thai-bg', items:[
      {text:'כרטיסים לתאילנד', topics:['✈️ נסיעות','🎟️ הזמנות'], big:true}
    ]},
    {id:'psych', label:'התמחות בפסיכולוגיה', emoji:'🎓', c:'--d-psych', bg:'--d-psych-bg', items:[
      {text:'רישיון קבע בפסיכולוגיה', topics:['📄 בירוקרטיה','👀 מעקב'], big:true},
      {text:'סטטוס דואר רשום', topics:['👀 מעקב','📦 משלוחים'], quick:true},
      {text:'מלגה', topics:['📄 בירוקרטיה','👀 מעקב','📎 מסמכים'], big:true},
      {text:'שיעורי פסיכולוגיה', topics:['📚 לימודים','👀 מעקב']}
    ]},
    {id:'me', label:'אני', emoji:'❤️', c:'--d-me', bg:'--d-me-bg', items:[
      {text:'מגנזיום וברזל', topics:['⏰ הרגלים','🩺 בריאות'], quick:true},
      {text:'אימון אביליטי', topics:['💪 בריאות','📅 שגרה']}
    ]},
    {id:'maya', label:'מאיה', emoji:'👩', c:'--d-maya', bg:'--d-maya-bg', items:[
      {text:'הודעה למאיה', topics:['💬 תקשורת','⏳ ממתין'], quick:true}
    ]},
    {id:'aviva', label:'אביבה', emoji:'👩', c:'--d-aviva', bg:'--d-aviva-bg', items:[
      {text:'מספר חשבון בנק לאביבה', topics:['💬 תקשורת','💰 כספים'], quick:true}
    ]},
    {id:'michal', label:'מיכל', emoji:'👩', c:'--d-michal', bg:'--d-michal-bg', items:[
      {text:'מיכל – הזמנה לבית חולים', topics:['🩺 בריאות','💬 תקשורת']}
    ]},
    {id:'home', label:'הבית', emoji:'🏠', c:'--d-home', bg:'--d-home-bg', items:[
      {text:'קניות לשבת', topics:['🛒 קניות','🍳 אוכל'], urgent:true},
      {text:'קקי סטיק לשירותים', topics:['🚽 תחזוקה','🛒 קניות'], quick:true},
      {text:'פשטידה למחר', topics:['🍳 אוכל','⏰ תזמון'], urgent:true}
    ]},
    {id:'arbel', label:'ארבל', emoji:'👶', c:'--d-arbel', bg:'--d-arbel-bg', items:[
      {text:'הזמנה מאלי אקספרס', topics:['🛒 קניות','📦 משלוחים']},
      {text:'מוניטור לתינוקת', topics:['🍼 תינוקת','🛒 קניות'], big:true},
      {text:'מושב מטוס', topics:['✈️ נסיעות','🍼 תינוקת'], big:true},
      {text:'סל אמבטיה', topics:['🏠 בית','🍼 תינוקת'], quick:true},
      {text:'לקנות חיתולים', topics:['🛒 קניות','🍼 תינוקת'], urgent:true},
      {text:'להכין אוכל לארבל', topics:['🍳 אוכל','🍼 תינוקת']}
    ]},
    {id:'career', label:'קריירה', emoji:'💼', c:'--d-career', bg:'--d-career-bg', items:[
      {text:'קורות חיים', topics:['📄 מסמכים','🚀 חיפוש עבודה'], big:true},
      {text:'מכתב המלצה למנהל', topics:['📄 מסמכים','💬 תקשורת'], quick:true}
    ]}
  ];

  window.DOMAINS = DOMAINS;

  var PERSON_DOMAINS = ['maya','aviva','michal'];
  function isPersonDomain(d){ return PERSON_DOMAINS.indexOf(d.id) !== -1; }

  function tagFor(d, item){
    if (item.urgent) return {icon:'⏰', text:'היום'};
    if (isPersonDomain(d)) return {icon:'👀', text:'במעקב אצל '+d.label};
    if (item.quick) return {icon:'⚡', text:'5 דקות'};
    if (item.big) return {icon:'📌', text:'גדול ומתמשך'};
    return {icon:'🗓️', text:'השבוע'};
  }

  var FILTERS = {
    all:      function(d, item){ return true; },
    quick:    function(d, item){ return !!item.quick; },
    week:     function(d, item){ return !item.urgent && !isPersonDomain(d); },
    big:      function(d, item){ return !!item.big; },
    tracked:  function(d, item){ return isPersonDomain(d); },
    shopping: function(d, item){ return item.topics.indexOf('🛒 קניות') !== -1; }
  };

  function matchesSearch(d, item, q){
    if (!q) return true;
    var hay = (item.text+' '+d.label+' '+item.topics.join(' ')).toLowerCase();
    return hay.indexOf(q) !== -1;
  }

  function bucketFor(d, item){
    if (item.urgent) return 'near_day';
    if (item.big) return 'later';
    return 'near_week';
  }

  var BUCKETS = [
    {id:'near_day',  label:'יום קרוב',  icon:'⏰'},
    {id:'near_week', label:'שבוע קרוב', icon:'🗓️'},
    {id:'later',     label:'בהמשך',     icon:'📌'}
  ];

  var listEl = document.getElementById('taskList');
  var searchInput = document.getElementById('searchInput');
  var currentFilter = 'all';

  function itemCard(d, item){
    var tag = tagFor(d, item);
    var card = document.createElement('div');
    card.className = 'item-card';
    card.innerHTML = '<span class="item-marker" style="background:var('+d.c+')"></span>'
      + '<div class="item-body">'
      + '<div class="item-text">'+item.text+'</div>'
      + '<div class="item-tags">'
      + '<span class="tag-chip" style="color:var('+d.c+')">'+d.emoji+' '+d.label+'</span>'
      + item.topics.map(function(t){ return '<span class="tag-chip">'+t+'</span>'; }).join('')
      + '<span class="tag-chip tag-chip--time">'+tag.icon+' '+tag.text+'</span>'
      + '</div></div>';
    return card;
  }

  function recurringCard(r){
    var card = document.createElement('div');
    card.className = 'item-card';
    card.innerHTML = '<span class="item-marker" style="background:var(--accent)"></span>'
      + '<div class="item-body">'
      + '<div class="item-text">'+r.emoji+' '+r.label+'</div>'
      + '<div class="item-tags"><span class="tag-chip tag-chip--time">🔁 '+r.cadence+'</span></div>'
      + '</div>';
    return card;
  }

  function render(){
    var q = (searchInput && searchInput.value || '').trim().toLowerCase();
    var pred = FILTERS[currentFilter] || FILTERS.all;
    listEl.innerHTML = '';

    var grouped = {near_day:[], near_week:[], later:[]};
    DOMAINS.forEach(function(d){
      d.items.forEach(function(item){
        if (pred(d, item) && matchesSearch(d, item, q)) grouped[bucketFor(d, item)].push(itemCard(d, item));
      });
    });

    if (currentFilter === 'all'){
      (window.RECURRING || []).forEach(function(r){
        if (!r.near) return;
        var hay = (r.label+' '+r.cadence).toLowerCase();
        if (q && hay.indexOf(q) === -1) return;
        grouped.near_day.push(recurringCard(r));
      });
    }

    var totalShown = 0;
    BUCKETS.forEach(function(bucket){
      var cards = grouped[bucket.id];
      if (!cards.length) return;
      totalShown += cards.length;

      var group = document.createElement('div');
      group.className = 'domain-group';

      var header = document.createElement('div');
      header.className = 'domain-group-header';
      header.innerHTML = '<span class="domain-badge" style="background:var(--accent-bg);color:var(--accent)">'+bucket.icon+'</span>'
        + '<span class="domain-group-label">'+bucket.label+'</span>'
        + '<span class="domain-group-count">'+cards.length+'</span>';
      group.appendChild(header);

      cards.forEach(function(card){ group.appendChild(card); });
      listEl.appendChild(group);
    });

    if (!totalShown){
      listEl.innerHTML = '<div class="empty-state">אין כרגע משימות שמתאימות לזה ✦</div>';
    }
  }

  var filterChips = document.querySelectorAll('#chips .chip');
  filterChips.forEach(function(chip){
    chip.addEventListener('click', function(){
      filterChips.forEach(function(c){ c.classList.remove('active'); });
      chip.classList.add('active');
      currentFilter = chip.getAttribute('data-filter') || 'all';
      render();
    });
  });

  if (searchInput) searchInput.addEventListener('input', render);

  render();
})();

(function(){
  var RECURRING = window.RECURRING;

  var row = document.getElementById('recurring');
  var tip = document.getElementById('recurringTip');
  var chips = [];
  var openChip = null;

  function hideTip(){
    tip.classList.remove('show');
    if (openChip) openChip.classList.remove('show');
    openChip = null;
  }

  RECURRING.forEach(function(r){
    var b = document.createElement('button');
    b.className = 'recurring-chip';
    b.innerHTML = '<span class="bubble">'+r.emoji+'</span>';
    b.addEventListener('click', function(e){
      e.stopPropagation();
      var wasOpen = (openChip === b);
      hideTip();
      if (wasOpen) return;
      var rect = b.getBoundingClientRect();
      tip.textContent = r.label+' · '+r.cadence;
      tip.style.left = (rect.left + rect.width/2) + 'px';
      tip.style.top = (rect.bottom + 6) + 'px';
      tip.classList.add('show');
      b.classList.add('show');
      openChip = b;
    });
    row.appendChild(b);
    chips.push(b);
  });

  row.addEventListener('scroll', hideTip);
  document.addEventListener('click', hideTip);
})();
</script>
</body>
</html>
